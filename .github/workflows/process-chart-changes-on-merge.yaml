name: Parallel Helm Chart Processing CI

on:
  push:
    branches: [main]
    paths: ['charts/**']

jobs:
  # JOB 1: Detect which charts changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          # Find directories in charts/ that have diffs compared to previous commit
          # Using jq to format the list into a JSON array for the matrix
          CHARTS=$(git diff --name-only HEAD^ HEAD | grep '^charts/' | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')

          if [ "$CHARTS" == "[]" ] || [ -z "$CHARTS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "matrix=$CHARTS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  # JOB 2: Process each changed chart in parallel
  process-charts:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false # Allows other charts to finish even if one fails
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tools
        run: |
          # Install yq for YAML manipulation
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq
          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Lint & Bump ${{ matrix.chart }}
        id: bump
        run: |
          CHART_DIR="charts/${{ matrix.chart }}"

          # 1. Lint the chart
          helm lint "$CHART_DIR"

          # 2. Check if the user already manually bumped the version in this commit
          if git diff HEAD^ HEAD "$CHART_DIR/Chart.yaml" | grep -q '^+version:'; then
            echo "manual=true" >> $GITHUB_OUTPUT
          else
            echo "manual
